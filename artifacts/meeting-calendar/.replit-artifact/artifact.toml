kind = "web"
previewPath = "/"
title = "Календарь встреч"
version = "1.0.0"
id = "artifacts/meeting-calendar"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24414

[services.development]
run = "pnpm --filter @workspace/meeting-calendar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meeting-calendar", "run", "build" ]
serve = "static"
publicDir = "artifacts/meeting-calendar/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24414"
BASE_PATH = "/"
